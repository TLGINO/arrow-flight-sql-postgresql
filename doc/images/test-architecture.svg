<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9C27B0"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#009688"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F57F17"/>
    </marker>
    <marker id="arrow-pink" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E91E63"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
      .title { font-size: 14px; font-weight: 600; fill: #212121; }
      .subtitle { font-size: 11px; font-weight: 500; fill: #424242; }
      .label { font-size: 10.5px; fill: #555; }
      .label-small { font-size: 9.5px; fill: #777; }
      .heading { font-size: 15px; font-weight: 700; fill: #333; }
      .zone-label { font-size: 12px; font-weight: 600; fill: #999; letter-spacing: 1px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" fill="#ffffff"/>

  <!-- ============================================================ -->
  <!-- ZONE A: Data Preparation Pipeline -->
  <!-- ============================================================ -->
  <text x="20" y="18" class="zone-label">DATA PREPARATION</text>

  <!-- Track 1: dbgen → .tbl → COPY → PostgreSQL -->
  <g id="track-data">
    <!-- dbgen -->
    <rect x="30" y="30" width="120" height="48" rx="6" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.3"/>
    <text x="90" y="52" text-anchor="middle" class="title" fill="#1565C0">dbgen</text>
    <text x="90" y="67" text-anchor="middle" class="label-small" fill="#1976D2">TPC-H / TPC-DS</text>

    <!-- Arrow -->
    <line x1="150" y1="54" x2="180" y2="54" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

    <!-- .tbl files -->
    <rect x="182" y="30" width="120" height="48" rx="6" fill="#fff3e0" stroke="#FF9800" stroke-width="1.3"/>
    <text x="242" y="52" text-anchor="middle" class="title" fill="#E65100">.tbl / .dat</text>
    <text x="242" y="67" text-anchor="middle" class="label-small" fill="#F57C00">pipe-delimited data</text>

    <!-- Arrow -->
    <line x1="302" y1="54" x2="332" y2="54" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

    <!-- pg_init.sql + COPY -->
    <rect x="334" y="30" width="165" height="48" rx="6" fill="#efebe9" stroke="#795548" stroke-width="1.3"/>
    <text x="416" y="49" text-anchor="middle" class="title" fill="#4E342E">pg_init.sql + COPY</text>
    <text x="416" y="65" text-anchor="middle" class="label-small" fill="#6D4C41">parallel load (4 workers)</text>

    <!-- Arrow -->
    <line x1="499" y1="54" x2="529" y2="54" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

    <!-- PostgreSQL -->
    <rect x="531" y="25" width="210" height="58" rx="6" fill="#efebe9" stroke="#795548" stroke-width="1.5"/>
    <text x="636" y="47" text-anchor="middle" class="title" fill="#4E342E">PostgreSQL</text>
    <text x="636" y="62" text-anchor="middle" class="label-small" fill="#6D4C41">UNLOGGED tables · indexes · ANALYZE</text>
    <text x="636" y="75" text-anchor="middle" class="label-small" fill="#6D4C41">tpch schema (8 tables) / tpcds (25)</text>
  </g>

  <!-- Track 2: isthmus-cli → .proto plans -->
  <g id="track-plans">
    <!-- isthmus-cli -->
    <rect x="30" y="100" width="155" height="48" rx="6" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.3"/>
    <text x="107" y="120" text-anchor="middle" class="title" fill="#1565C0">isthmus-cli</text>
    <text x="107" y="136" text-anchor="middle" class="label-small" fill="#1976D2">Substrait Java (Calcite SQL)</text>

    <!-- Arrow -->
    <line x1="185" y1="124" x2="215" y2="124" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

    <!-- .proto plans -->
    <rect x="217" y="100" width="155" height="48" rx="6" fill="#fff3e0" stroke="#FF9800" stroke-width="1.3"/>
    <text x="294" y="120" text-anchor="middle" class="title" fill="#E65100">.proto plans</text>
    <text x="294" y="136" text-anchor="middle" class="label-small" fill="#F57C00">binary Substrait protobuf</text>
  </g>

  <!-- Vertical arrows from Zone A into Zone B -->
  <!-- PostgreSQL data → feeds PG ground truth and Arrow paths -->
  <line x1="636" y1="83" x2="636" y2="172" stroke="#795548" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- .proto plans → feeds Substrait path -->
  <line x1="294" y1="148" x2="294" y2="172" stroke="#FF9800" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- ============================================================ -->
  <!-- ZONE B: Test Execution -->
  <!-- ============================================================ -->
  <g id="test-runner-container">
    <rect x="20" y="175" width="920" height="430" rx="10" fill="#fafafa" stroke="#4CAF50" stroke-width="1.5"/>
    <text x="480" y="196" text-anchor="middle" class="heading" fill="#2E7D32">test_substrait.py</text>
    <text x="480" y="212" text-anchor="middle" class="label" fill="#558B2F">Bitmask execution: 4 = pgsql, 2 = arrow, 1 = substrait  |  22 TPC-H queries, 99 TPC-DS queries</text>
  </g>

  <!-- ============================================================ -->
  <!-- Column 1: PG Ground Truth (purple) -->
  <!-- ============================================================ -->
  <g id="path-pgsql">
    <rect x="40" y="225" width="270" height="225" rx="7" fill="#f3e5f5" stroke="#9C27B0" stroke-width="1.3"/>
    <text x="175" y="247" text-anchor="middle" class="title" fill="#6A1B9A">PG Ground Truth</text>
    <text x="175" y="263" text-anchor="middle" class="label-small" fill="#8E24AA">bit 4 — PostgreSQL native</text>
    <line x1="55" y1="272" x2="295" y2="272" stroke="#CE93D8" stroke-width="0.5"/>

    <!-- psql box -->
    <rect x="62" y="282" width="226" height="36" rx="4" fill="#e1bee7" stroke="#AB47BC" stroke-width="0.8"/>
    <text x="175" y="299" text-anchor="middle" class="subtitle" fill="#6A1B9A">psql -t -A -F'\x01'</text>
    <text x="175" y="312" text-anchor="middle" class="label-small">CSV output via subprocess</text>

    <!-- Arrow down -->
    <line x1="175" y1="318" x2="175" y2="334" stroke="#9C27B0" stroke-width="1" marker-end="url(#arrow-purple)"/>

    <!-- parse_csv_value -->
    <rect x="62" y="336" width="226" height="32" rx="4" fill="#e1bee7" stroke="#AB47BC" stroke-width="0.8"/>
    <text x="175" y="356" text-anchor="middle" class="subtitle" fill="#6A1B9A">parse_csv_value()</text>

    <!-- Arrow down -->
    <line x1="175" y1="368" x2="175" y2="384" stroke="#9C27B0" stroke-width="1" marker-end="url(#arrow-purple)"/>

    <!-- Result -->
    <rect x="62" y="386" width="226" height="50" rx="4" fill="#e1bee7" stroke="#AB47BC" stroke-width="0.8"/>
    <text x="175" y="406" text-anchor="middle" class="subtitle" fill="#6A1B9A">Normalized Rows</text>
    <text x="175" y="422" text-anchor="middle" class="label-small">floats → 4 decimals, dates → ISO</text>
  </g>

  <!-- ============================================================ -->
  <!-- Column 2: Arrow Flight SQL (teal) -->
  <!-- ============================================================ -->
  <g id="path-arrow">
    <rect x="340" y="225" width="270" height="225" rx="7" fill="#e0f2f1" stroke="#009688" stroke-width="1.3"/>
    <text x="475" y="247" text-anchor="middle" class="title" fill="#00695C">Arrow Flight SQL</text>
    <text x="475" y="263" text-anchor="middle" class="label-small" fill="#00796B">bit 2 — SQL via Flight client</text>
    <line x1="355" y1="272" x2="595" y2="272" stroke="#80CBC4" stroke-width="0.5"/>

    <!-- _flight_helper.py -->
    <rect x="362" y="282" width="226" height="48" rx="4" fill="#b2dfdb" stroke="#26A69A" stroke-width="0.8"/>
    <text x="475" y="299" text-anchor="middle" class="subtitle" fill="#00695C">_flight_helper.py</text>
    <text x="475" y="313" text-anchor="middle" class="label-small">persistent subprocess</text>
    <text x="475" y="325" text-anchor="middle" class="label-small">SQL &lt;nbytes&gt;\n&lt;utf8&gt;</text>

    <!-- Arrow down -->
    <line x1="475" y1="330" x2="475" y2="346" stroke="#009688" stroke-width="1" marker-end="url(#arrow-teal)"/>

    <!-- FlightClient -->
    <rect x="362" y="348" width="226" height="32" rx="4" fill="#b2dfdb" stroke="#26A69A" stroke-width="0.8"/>
    <text x="475" y="368" text-anchor="middle" class="subtitle" fill="#00695C">FlightClient → Arrow IPC</text>

    <!-- Arrow down -->
    <line x1="475" y1="380" x2="475" y2="396" stroke="#009688" stroke-width="1" marker-end="url(#arrow-teal)"/>

    <!-- Result -->
    <rect x="362" y="398" width="226" height="38" rx="4" fill="#b2dfdb" stroke="#26A69A" stroke-width="0.8"/>
    <text x="475" y="415" text-anchor="middle" class="subtitle" fill="#00695C">Normalized Rows</text>
    <text x="475" y="429" text-anchor="middle" class="label-small">table_to_rows() → tuples</text>
  </g>

  <!-- ============================================================ -->
  <!-- Column 3: Substrait (amber) -->
  <!-- ============================================================ -->
  <g id="path-substrait">
    <rect x="640" y="225" width="280" height="225" rx="7" fill="#fff8e1" stroke="#FFC107" stroke-width="1.3"/>
    <text x="780" y="247" text-anchor="middle" class="title" fill="#F57F17">Substrait</text>
    <text x="780" y="263" text-anchor="middle" class="label-small" fill="#F9A825">bit 1 — binary plan via Flight client</text>
    <line x1="655" y1="272" x2="905" y2="272" stroke="#FFE082" stroke-width="0.5"/>

    <!-- _flight_helper.py -->
    <rect x="662" y="282" width="236" height="48" rx="4" fill="#ffecb3" stroke="#FFB300" stroke-width="0.8"/>
    <text x="780" y="299" text-anchor="middle" class="subtitle" fill="#F57F17">_flight_helper.py</text>
    <text x="780" y="313" text-anchor="middle" class="label-small">persistent subprocess</text>
    <text x="780" y="325" text-anchor="middle" class="label-small">PLAN &lt;nbytes&gt;\n&lt;proto&gt;</text>

    <!-- Arrow down -->
    <line x1="780" y1="330" x2="780" y2="346" stroke="#F57F17" stroke-width="1" marker-end="url(#arrow-amber)"/>

    <!-- FlightClient -->
    <rect x="662" y="348" width="236" height="32" rx="4" fill="#ffecb3" stroke="#FFB300" stroke-width="0.8"/>
    <text x="780" y="368" text-anchor="middle" class="subtitle" fill="#F57F17">FlightClient → Arrow IPC</text>

    <!-- Arrow down -->
    <line x1="780" y1="380" x2="780" y2="396" stroke="#F57F17" stroke-width="1" marker-end="url(#arrow-amber)"/>

    <!-- Result -->
    <rect x="662" y="398" width="236" height="38" rx="4" fill="#ffecb3" stroke="#FFB300" stroke-width="0.8"/>
    <text x="780" y="415" text-anchor="middle" class="subtitle" fill="#F57F17">Normalized Rows</text>
    <text x="780" y="429" text-anchor="middle" class="label-small">table_to_rows() → tuples</text>
  </g>

  <!-- ============================================================ -->
  <!-- Convergence arrows to rows_equal() -->
  <!-- ============================================================ -->
  <line x1="175" y1="450" x2="175" y2="472" stroke="#9C27B0" stroke-width="1.3"/>
  <line x1="175" y1="472" x2="330" y2="490" stroke="#9C27B0" stroke-width="1.3" marker-end="url(#arrow-pink)"/>

  <line x1="475" y1="450" x2="475" y2="488" stroke="#009688" stroke-width="1.3" marker-end="url(#arrow-pink)"/>

  <line x1="780" y1="450" x2="780" y2="472" stroke="#F57F17" stroke-width="1.3"/>
  <line x1="780" y1="472" x2="630" y2="490" stroke="#F57F17" stroke-width="1.3" marker-end="url(#arrow-pink)"/>

  <!-- ============================================================ -->
  <!-- rows_equal() comparison box -->
  <!-- ============================================================ -->
  <g id="comparison">
    <rect x="330" y="478" width="300" height="42" rx="6" fill="#fce4ec" stroke="#E91E63" stroke-width="1.5"/>
    <text x="480" y="497" text-anchor="middle" class="title" fill="#AD1457">rows_equal()</text>
    <text x="480" y="513" text-anchor="middle" class="label-small" fill="#C2185B">normalize · sort · row-by-row diff</text>
  </g>

  <!-- ============================================================ -->
  <!-- Output fan-out -->
  <!-- ============================================================ -->

  <!-- Arrow down from rows_equal -->
  <line x1="480" y1="520" x2="480" y2="540" stroke="#E91E63" stroke-width="1.2"/>

  <!-- Fan-out lines -->
  <line x1="480" y1="540" x2="130" y2="555" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="480" y1="540" x2="380" y2="555" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="480" y1="540" x2="600" y2="555" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="480" y1="540" x2="830" y2="555" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Output boxes -->
  <g id="outputs">
    <!-- PASS/FAIL -->
    <rect x="60" y="557" width="140" height="36" rx="5" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1"/>
    <text x="130" y="575" text-anchor="middle" class="subtitle" fill="#2E7D32">PASS / FAIL</text>
    <text x="130" y="588" text-anchor="middle" class="label-small">per-query status</text>

    <!-- Timing CSVs -->
    <rect x="310" y="557" width="155" height="36" rx="5" fill="#fff3e0" stroke="#FF9800" stroke-width="1"/>
    <text x="387" y="575" text-anchor="middle" class="subtitle" fill="#E65100">Timing CSVs</text>
    <text x="387" y="588" text-anchor="middle" class="label-small">timing/timing_tpch_sf*.csv</text>

    <!-- EXPLAIN HTML -->
    <rect x="520" y="557" width="175" height="36" rx="5" fill="#e8f4fd" stroke="#2196F3" stroke-width="1"/>
    <text x="607" y="575" text-anchor="middle" class="subtitle" fill="#1565C0">EXPLAIN HTML</text>
    <text x="607" y="588" text-anchor="middle" class="label-small">plot_explain.py → tpch.html</text>

    <!-- Performance charts -->
    <rect x="745" y="557" width="180" height="36" rx="5" fill="#f3e5f5" stroke="#9C27B0" stroke-width="1"/>
    <text x="835" y="575" text-anchor="middle" class="subtitle" fill="#6A1B9A">Performance Charts</text>
    <text x="835" y="588" text-anchor="middle" class="label-small">plot_tpch_performance.py</text>
  </g>
</svg>